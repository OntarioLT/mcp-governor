# MCP Governor — Minimal Deployment
# Core components only (5 containers)
# Usage: docker compose -f docker-compose.min.yml up -d
#
# 社区版: docker compose -f docker-compose.min.yml up -d
# 企业版: MCP_EDITION=enterprise docker compose -f docker-compose.min.yml up -d

services:
  mcp-governor:
    image: ontariolt/mcp-governor:${MCP_EDITION:-community}-latest
    container_name: mcp-governor
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - AUDIT_LOG_DIR=/var/log/mcp-governor
      - OPA_ADDR=http://opa:8181
    volumes:
      - governor-logs:/var/log/mcp-governor
      - ./config:/app/config:ro
      - ./policies:/app/policies:ro
    depends_on:
      - opa
    restart: unless-stopped
    networks:
      - mcp-net

  opa:
    image: openpolicyagent/opa:latest
    container_name: mcp-governor-opa
    command:
      - "run"
      - "-s"
      - "--addr=0.0.0.0:8181"
      - "--log-level=info"
      - "/policies"
    volumes:
      - ./policies:/policies:ro
    ports:
      - "8181:8181"
    restart: unless-stopped
    networks:
      - mcp-net

  erp-api:
    image: ontariolt/mcp-erp-api:community-latest
    container_name: mcp-erp-api
    ports:
      - "9003:9003"
    restart: unless-stopped
    networks:
      - mcp-net

  crm-api:
    image: ontariolt/mcp-crm-api:community-latest
    container_name: mcp-crm-api
    ports:
      - "9002:9002"
    restart: unless-stopped
    networks:
      - mcp-net

  admin:
    image: ontariolt/mcp-governor-admin:community-latest
    container_name: mcp-admin
    ports:
      - "3002:3002"
    environment:
      - VITE_API_URL=http://mcp-governor:8080
    depends_on:
      - mcp-governor
    restart: unless-stopped
    networks:
      - mcp-net

volumes:
  governor-logs:

networks:
  mcp-net:
    driver: bridge
