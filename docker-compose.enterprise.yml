# MCP Governor — Enterprise Full Stack Deployment
# Includes: Gateway (Enterprise) + OPA + ERP + CRM + Prometheus + Grafana + Langfuse + Admin UI
# Usage: docker compose -f docker-compose.enterprise.yml up -d
#
# 与社区版 docker-compose.yml 唯一区别：mcp-governor 使用 enterprise-latest 镜像
#
# 前置条件：
#   1. 从商务获取 License 文件 (license.key)
#   2. 将 License 文件放到当前目录
#   3. 设置私有 Registry（可选，默认使用阿里云 ACR）
#
# 设置私有 Registry：
#   export ENTERPRISE_REGISTRY=registry.cn-hangzhou.aliyuncs.com/your-namespace

services:
  mcp-governor:
    image: ${ENTERPRISE_REGISTRY:-registry.cn-hangzhou.aliyuncs.com/your-repo}/mcp-governor:enterprise-latest
    container_name: mcp-governor
    ports:
      - "7680:7680"
    env_file:
      - .env
    environment:
      - AUDIT_LOG_DIR=/var/log/mcp-governor
      - OPA_ADDR=http://opa:8181
      - MCP_LICENSE_STRICT=true
    volumes:
      - governor-logs:/var/log/mcp-governor
      - ./config:/app/config:ro
      - ./policies:/app/policies:ro
    depends_on:
      - opa
    restart: unless-stopped
    networks:
      - mcp-net

  opa:
    image: openpolicyagent/opa:latest
    container_name: mcp-governor-opa
    command:
      - "run"
      - "-s"
      - "--addr=0.0.0.0:8181"
      - "--log-level=info"
      - "/policies"
    volumes:
      - ./policies:/policies:ro
    ports:
      - "8181:8181"
    restart: unless-stopped
    networks:
      - mcp-net

  erp-api:
    image: ontariolt/mcp-erp-api:community-latest
    container_name: mcp-erp-api
    ports:
      - "9003:9003"
    restart: unless-stopped
    networks:
      - mcp-net

  crm-api:
    image: ontariolt/mcp-crm-api:community-latest
    container_name: mcp-crm-api
    ports:
      - "9002:9002"
    restart: unless-stopped
    networks:
      - mcp-net

  admin:
    image: ontariolt/mcp-governor-admin:community-latest
    container_name: mcp-admin
    ports:
      - "8080:8080"
    environment:
      - VITE_API_URL=http://mcp-governor:7680
    depends_on:
      - mcp-governor
    restart: unless-stopped
    networks:
      - mcp-net

  prometheus:
    image: prom/prometheus:latest
    container_name: mcp-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped
    networks:
      - mcp-net

  grafana:
    image: grafana/grafana:latest
    container_name: mcp-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - mcp-net

  langfuse:
    image: langfuse/langfuse:2
    container_name: mcp-langfuse
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      - NEXTAUTH_URL=http://localhost:3001
      - NEXTAUTH_SECRET=mcp-governor-demo-secret
      - SALT=mcp-governor-demo-salt
    depends_on:
      - langfuse-db
    restart: unless-stopped
    networks:
      - mcp-net

  langfuse-db:
    image: postgres:15
    container_name: mcp-langfuse-db
    environment:
      - POSTGRES_USER=langfuse
      - POSTGRES_PASSWORD=langfuse
      - POSTGRES_DB=langfuse
    volumes:
      - langfuse-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - mcp-net

volumes:
  governor-logs:
  prometheus-data:
  grafana-data:
  langfuse-data:

networks:
  mcp-net:
    driver: bridge
