backends:
- base_url: http://mcp-crm-api:9002
  namespace: crm
  scope: internal
  auth:
    type: none
  timeout_ms: 5000
  endpoints:
  - name: health
    description: Health
    method: GET
    path: /health
    input_schema:
      type: object
      properties: {}
  - name: get_customer
    description: Get Customer
    method: GET
    path: /customers/{customer_id}
    input_schema:
      type: object
      properties:
        customer_id:
          type: string
          title: Customer Id
      required:
      - customer_id
  - name: get_customer_orders
    description: Get Customer Orders
    method: GET
    path: /customers/{customer_id}/orders
    input_schema:
      type: object
      properties:
        customer_id:
          type: string
          title: Customer Id
      required:
      - customer_id
  - name: create_order
    description: Create a sales order with delivery address and warehouse
    method: POST
    path: /orders
    input_schema:
      type: object
      properties:
        customer_id:
          type: string
          title: Customer Id
        product:
          type: string
          title: Product
        price:
          type: number
          title: Price
        amount:
          type: integer
          title: Amount
          default: 1
        delivery_address:
          type: string
          title: Delivery Address
          default: ''
        warehouse:
          type: string
          title: Warehouse
          default: ''
      required:
      - customer_id
      - product
      - price
- base_url: https://jsonplaceholder.typicode.com
  namespace: jp
  auth:
    type: none
  timeout_ms: 5000
  endpoints:
  - name: list_posts
    description: List all posts
    method: GET
    path: /posts
    input_schema:
      type: object
      properties: {}
  - name: get_posts_by_id
    description: Get a post by ID
    method: GET
    path: /posts/{id}
    input_schema:
      type: object
      properties:
        id:
          type: integer
          description: Post ID
      required:
      - id
  - name: create_post
    description: Create a new post
    method: POST
    path: /posts
    input_schema:
      type: object
      properties:
        title:
          type: string
        body:
          type: string
        userId:
          type: integer
      required:
      - title
      - body
      - userId
  - name: list_users
    description: List all users
    method: GET
    path: /users
    input_schema:
      type: object
      properties: {}
  - name: get_users_by_id
    description: Get a user by ID
    method: GET
    path: /users/{id}
    input_schema:
      type: object
      properties:
        id:
          type: integer
          description: User ID
      required:
      - id
