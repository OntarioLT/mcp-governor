name: Confluence
description: "Confluence MCP Server — 知识库文档管理"
transport: http
url_template: "https://your-domain.atlassian.net/wiki/mcp"
auth_type: api_key
auth_header: "Authorization"
auth_template: "Basic ${api_key}"
default_tools:
  - name: "list_spaces"
    description: "List wiki spaces"
  - name: "get_page"
    description: "Get page content"
  - name: "create_page"
    description: "Create a new page"
tags: ["content", "docs"]
