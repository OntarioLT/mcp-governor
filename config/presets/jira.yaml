name: Jira
description: "Jira MCP Server — 项目管理、Issue 跟踪"
transport: http
url_template: "https://your-domain.atlassian.net/mcp"
auth_type: api_key
auth_header: "Authorization"
auth_template: "Basic ${api_key}"
default_tools:
  - name: "list_projects"
    description: "List Jira projects"
  - name: "list_issues"
    description: "Search issues"
  - name: "create_issue"
    description: "Create a new issue"
  - name: "update_issue"
    description: "Update issue status"
tags: ["devops", "ci"]
