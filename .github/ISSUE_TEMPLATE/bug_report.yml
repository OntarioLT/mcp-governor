name: Bug Report
description: 报告 MCP Governor 的 Bug
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你报告问题！请填写以下信息帮助我们定位问题。

        **注意**：本项目采用闭源分发模式，不接受代码贡献。如有功能需求，请通过商务渠道对接。

  - type: input
    id: version
    attributes:
      label: MCP Governor 版本
      description: "请提供你使用的版本号（docker images | grep mcp-governor）"
      placeholder: "community-latest"
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: 部署方式
      options:
        - docker-compose.min.yml（最小化部署）
        - docker compose up -d（完整部署）
        - 其他
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: "请清晰描述你遇到的问题"
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: "请提供复现问题的步骤"
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: "你期望发生什么？"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: "实际发生了什么？"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 相关日志
      description: "请提供相关日志输出"
      render: shell
      value: |
        docker compose logs mcp-governor --tail 50
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: "请提供你的环境信息"
      value: |
        - OS: 
        - Docker: 
        - Docker Compose: 
    validations:
      required: true
